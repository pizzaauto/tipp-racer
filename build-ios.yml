name: Build iOS IPA (unsigned)

# Baut komplett in der GitHub-Cloud auf einem macOS-Runner mit Xcode.
# Ergebnis: eine UNSIGNIERTE .ipa als Download (Artifact).
# Kein eigener Mac und kein Apple-Developer-Account noetig.

on:
  workflow_dispatch:        # Manuell starten: Reiter "Actions" -> "Run workflow"
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Capacitor installieren
        run: npm install

      - name: iOS-Projekt erzeugen
        run: npx cap add ios

      - name: Web-Dateien synchronisieren
        run: npx cap sync ios

      - name: App unsigniert bauen
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: In .ipa verpacken
        run: |
          APP_DIR="build/Build/Products/Release-iphoneos"
          cd "$APP_DIR"
          mkdir -p Payload
          cp -R App.app Payload/
          zip -r TippRacer-unsigned.ipa Payload > /dev/null
          cd -
          mkdir -p out
          cp "$APP_DIR/TippRacer-unsigned.ipa" out/

      - name: IPA hochladen (Download unter "Artifacts")
        uses: actions/upload-artifact@v4
        with:
          name: TippRacer-unsigned-ipa
          path: out/TippRacer-unsigned.ipa
